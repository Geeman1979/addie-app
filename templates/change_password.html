{% extends "base.html" %}{% block content %}
<h4 style="color:var(--navy);font-weight:700;"><i class="bi bi-key"></i> Change Password</h4>
<p style="color:#666;font-size:0.85rem;">Update your password. You'll be logged out after changing it.</p>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('change_password') }}">
                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.85rem;">Current Password</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.85rem;">New Password</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" style="font-size:0.85rem;">Confirm New Password</label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Update Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
